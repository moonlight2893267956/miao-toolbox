name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    name: API 测试 (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 运行 API 测试
        working-directory: miao-toolbox-api
        run: ./mvnw test --batch-mode

  web-build:
    name: 前端构建 & 检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: miao-toolbox-web/package-lock.json

      - name: 安装依赖
        working-directory: miao-toolbox-web
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: miao-toolbox-web
        run: npm run typecheck

      - name: ESLint 检查
        working-directory: miao-toolbox-web
        run: npm run lint

      - name: 生产构建
        working-directory: miao-toolbox-web
        run: npm run build
