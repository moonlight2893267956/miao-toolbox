name: CD — 构建并推送 Docker 镜像

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}-api
  WEB_IMAGE_NAME: ${{ github.repository }}-web

jobs:
  build-and-push:
    name: 构建 & 推送至 GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "api_image=${REGISTRY}/${REPO_LOWER}-api" >> $GITHUB_OUTPUT
          echo "web_image=${REGISTRY}/${REPO_LOWER}-web" >> $GITHUB_OUTPUT
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: 构建并推送 API 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./miao-toolbox-api
          file: ./miao-toolbox-api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ inputs.version }}
            ${{ steps.meta.outputs.api_image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}

      - name: 构建并推送 Web 镜像
        uses: docker/build-push-action@v6
        with:
          context: ./miao-toolbox-web
          file: ./miao-toolbox-web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:${{ inputs.version }}
            ${{ steps.meta.outputs.web_image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
