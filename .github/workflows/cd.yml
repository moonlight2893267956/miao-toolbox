name: CD - Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "api_image=ghcr.io/${REPO_LOWER}-api"
            echo "web_image=ghcr.io/${REPO_LOWER}-web"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./miao-toolbox-api
          file: ./miao-toolbox-api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}:${{ inputs.version }}
            ${{ steps.meta.outputs.api_image }}:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./miao-toolbox-web
          file: ./miao-toolbox-web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:${{ inputs.version }}
            ${{ steps.meta.outputs.web_image }}:latest
