<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿渺工具箱 — 登录页 Mock</title>
<!--
  Spine governance:
  - DESIGN.md: display typography, colors (primary #5C4FD0), rounded (md 10px, xl 20px)
  - EXPERIENCE.md: IA (登录/注册), State Patterns (login-fail, oauth-fail, account-locked), Key Flow 1 step 1-2
-->
<style>
  :root {
    --primary: #5C4FD0;
    --primary-foreground: #FFFFFF;
    --primary-hover: #6D62D6;
    --primary-10: rgba(92, 79, 208, 0.1);
    --accent: #D97020;
    --bg: #F5F5F5;
    --surface: #FFFFFF;
    --text-primary: #1A1A2E;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --error: #FF5630;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
  }

  /* Left brand panel */
  .brand-panel {
    width: 45%;
    background: var(--primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    color: var(--primary-foreground);
  }

  .brand-icon {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.15);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 32px;
  }

  .brand-title {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    text-align: center;
  }

  .brand-desc {
    font-size: 16px;
    opacity: 0.85;
    line-height: 1.6;
    text-align: center;
    max-width: 320px;
  }

  /* Right login panel */
  .login-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .login-card {
    width: 100%;
    max-width: 400px;
  }

  .login-greeting {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  /* Form */
  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s;
    outline: none;
  }

  .form-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-10);
  }

  .form-input.error {
    border-color: var(--error);
  }

  .form-error {
    font-size: 12px;
    color: var(--error);
    margin-top: 4px;
  }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    color: var(--primary-foreground);
    border: none;
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }

  .btn-primary:hover {
    background: var(--primary-hover);
  }

  .btn-oauth {
    width: 100%;
    padding: 12px;
    background: var(--surface);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.15s;
  }

  .btn-oauth:hover {
    border-color: var(--text-secondary);
  }

  .oauth-icon {
    width: 20px;
    height: 20px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider::before { margin-right: 16px; }
  .divider::after { margin-left: 16px; }

  /* Register link */
  .register-hint {
    text-align: center;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 24px;
  }

  .register-hint a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 500;
  }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
</style>
</head>
<body>

<div class="brand-panel">
  <div class="brand-icon">渺</div>
  <div class="brand-title">阿渺工具箱</div>
  <div class="brand-desc">AI 工具，一次登录，触手可及。<br>可管 · 可控 · 可扩展</div>
</div>

<div class="login-panel">
  <div class="login-card">
    <div class="login-greeting">欢迎回来 👋</div>
    <div class="login-sub">登录以继续使用阿渺工具箱</div>

    <button class="btn-oauth">
      <svg class="oauth-icon" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      使用 GitHub 登录
    </button>

    <div class="divider">或</div>

    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" type="text" placeholder="输入用户名" autocomplete="username">
    </div>

    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" placeholder="输入密码" autocomplete="current-password">
    </div>

    <button class="btn-primary">登录</button>

    <div class="register-hint">
      还没有账号？<a href="#">注册</a>
    </div>
  </div>
</div>

<button class="theme-toggle" aria-label="切换深色/浅色模式">🌙</button>

</body>
</html>
