<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>阿渺工具箱 — 工具列表页 Mock</title>
<!--
  Spine governance:
  - DESIGN.md: colors (primary #5C4FD0, accent #D97020), typography (display-sm), rounded (md 10px, lg 14px), components (tool-card, sidebar-nav-item-active)
  - EXPERIENCE.md: IA (工具列表), Component Patterns (tool-card, sidebar-nav, user-dropdown), State Patterns (cold-start, no-tools), Key Flow 1
-->
<style>
  :root {
    --primary: #5C4FD0;
    --primary-foreground: #FFFFFF;
    --primary-hover: #6D62D6;
    --primary-10: rgba(92, 79, 208, 0.1);
    --accent: #D97020;
    --bg: #F5F5F5;
    --surface: #FFFFFF;
    --text-primary: #1A1A2E;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --sidebar-width: 240px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 12px;
    flex-shrink: 0;
  }

  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin-bottom: 24px;
  }

  .sidebar-brand-icon {
    width: 32px;
    height: 32px;
    background: var(--primary);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-foreground);
    font-size: 16px;
    font-weight: 700;
  }

  .sidebar-brand-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .sidebar-section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 8px 12px;
    margin-top: 8px;
  }

  .sidebar-nav {
    list-style: none;
  }

  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 14px;
    color: var(--text-primary);
    transition: background 0.15s, color 0.15s;
    margin-bottom: 2px;
  }

  .sidebar-nav-item:hover {
    background: var(--primary-10);
  }

  .sidebar-nav-item.active {
    background: var(--primary-10);
    color: var(--primary);
    font-weight: 500;
  }

  .sidebar-nav-item .icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .sidebar-spacer { flex: 1; }

  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: background 0.15s;
  }

  .sidebar-user:hover {
    background: var(--primary-10);
  }

  .sidebar-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--primary);
    color: var(--primary-foreground);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
  }

  .sidebar-user-info {
    flex: 1;
  }

  .sidebar-user-name {
    font-size: 14px;
    font-weight: 500;
  }

  .sidebar-user-role {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Main content */
  .main {
    flex: 1;
    padding: 32px 40px;
    overflow-y: auto;
  }

  .greeting {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 24px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.005em;
    margin-bottom: 8px;
  }

  .greeting-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  /* Tool grid */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1024px;
  }

  .tool-card {
    background: var(--primary);
    color: var(--primary-foreground);
    border-radius: var(--radius-lg);
    padding: 24px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .tool-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(92, 79, 208, 0.25);
  }

  .tool-card-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-bottom: 16px;
  }

  .tool-card-name {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .tool-card-desc {
    font-size: 13px;
    opacity: 0.85;
    line-height: 1.5;
  }

  .tool-card-arrow {
    position: absolute;
    right: 20px;
    bottom: 20px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* Disabled state */
  .tool-card.coming-soon {
    background: var(--surface);
    color: var(--text-secondary);
    border: 1px dashed var(--border);
  }

  .tool-card.coming-soon:hover {
    transform: none;
    box-shadow: none;
    cursor: default;
  }

  .tool-card.coming-soon .tool-card-icon {
    background: var(--bg);
  }

  .tool-card.coming-soon .tool-card-name {
    color: var(--text-secondary);
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">渺</div>
    <div class="sidebar-brand-text">阿渺工具箱</div>
  </div>

  <div class="sidebar-section-label">工具</div>
  <ul class="sidebar-nav">
    <li class="sidebar-nav-item active">
      <span class="icon">🧰</span> 工具列表
    </li>
  </ul>

  <div class="sidebar-section-label">管理</div>
  <ul class="sidebar-nav">
    <li class="sidebar-nav-item">
      <span class="icon">📊</span> 仪表盘
    </li>
    <li class="sidebar-nav-item">
      <span class="icon">🔧</span> 工具管理
    </li>
    <li class="sidebar-nav-item">
      <span class="icon">📋</span> 调用日志
    </li>
    <li class="sidebar-nav-item">
      <span class="icon">👥</span> 用户管理
    </li>
  </ul>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-user">
    <div class="sidebar-avatar">渺</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name">阿渺</div>
      <div class="sidebar-user-role">管理员</div>
    </div>
    <span style="color: var(--text-secondary);">⋮</span>
  </div>
</div>

<div class="main">
  <div class="greeting">你好，阿渺 👋</div>
  <div class="greeting-sub">选择一个工具开始使用</div>

  <div class="tool-grid">
    <div class="tool-card" role="button" tabindex="0" aria-label="文本翻译 — 多语言文本翻译工具">
      <div class="tool-card-icon">🌐</div>
      <div class="tool-card-name">文本翻译</div>
      <div class="tool-card-desc">多语言文本翻译工具</div>
      <div class="tool-card-arrow">→</div>
    </div>

    <div class="tool-card" role="button" tabindex="0" aria-label="文生图 — AI 图片生成工具">
      <div class="tool-card-icon">🎨</div>
      <div class="tool-card-name">文生图</div>
      <div class="tool-card-desc">AI 图片生成工具</div>
      <div class="tool-card-arrow">→</div>
    </div>

    <div class="tool-card" role="button" tabindex="0" aria-label="文生语音 — AI 语音合成工具">
      <div class="tool-card-icon">🔊</div>
      <div class="tool-card-name">文生语音</div>
      <div class="tool-card-desc">AI 语音合成工具</div>
      <div class="tool-card-arrow">→</div>
    </div>

    <div class="tool-card coming-soon">
      <div class="tool-card-icon">📝</div>
      <div class="tool-card-name">更多工具</div>
      <div class="tool-card-desc">新工具持续接入中…</div>
    </div>
  </div>
</div>

</body>
</html>
