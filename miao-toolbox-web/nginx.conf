server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml font/ttf font/otf;

    # 静态资源缓存(JS/CSS/图片/字体 7 天)
    # 注意:只用单一 Cache-Control 头,避免与 expires 叠加产生重复头导致浏览器缓存行为不确定
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # API 反代到后端容器(同 docker-compose 网络,service name = api)
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # 关闭缓冲，保证 SSE 流式接口逐条实时推送（避免前段结果被攒在代理端）
        proxy_buffering off;
        proxy_cache off;
        # 告诉下游代理（如 nginx 上游链）不要缓冲
        add_header X-Accel-Buffering no always;
        proxy_read_timeout 360s;
        client_max_body_size 100M;
    }

    # SPA fallback:所有未匹配的请求回到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
