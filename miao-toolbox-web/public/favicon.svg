<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="warmCool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1620" />
      <stop offset="100%" stop-color="#0a0e14" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(245, 158, 11, 0.35)" />
      <stop offset="60%" stop-color="rgba(6, 182, 212, 0.08)" />
      <stop offset="100%" stop-color="rgba(0, 0, 0, 0)" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="0" dy="4" />
      <feComponentTransfer><feFuncA type="linear" slope="0.4" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="104" ry="104" fill="url(#bg)" />

  <!-- 内部辉光 -->
  <rect x="32" y="32" width="448" height="448" rx="104" ry="104" fill="url(#glow)" />

  <!-- 边框 -->
  <rect x="32" y="32" width="448" height="448" rx="104" ry="104" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" />

  <!-- 装饰光斑 -->
  <circle cx="120" cy="120" r="60" fill="rgba(245, 158, 11, 0.12)" />
  <circle cx="392" cy="392" r="60" fill="rgba(6, 182, 212, 0.1)" />

  <!-- 主标识：双环相扣 (代表工具连接) -->
  <g transform="translate(256 256)" filter="url(#softShadow)">
    <!-- 左环 (暖色) -->
    <circle cx="-38" cy="0" r="68" fill="none" stroke="url(#warmCool)" stroke-width="28" stroke-linecap="round" opacity="0.95" />
    <!-- 右环 (冷色) -->
    <circle cx="38" cy="0" r="68" fill="none" stroke="url(#warmCool)" stroke-width="28" stroke-linecap="round" opacity="0.95" />
    <!-- 中心高光 -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" opacity="0.9" />
  </g>
</svg>
