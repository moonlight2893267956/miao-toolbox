spring:
  application:
    name: miao-toolbox-api-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.flyway.autoconfigure.FlywayAutoConfiguration
  jackson:
    date-format: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 0

miao:
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-testing-purposes
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 7
  rate-limit:
    authenticated:
      max-requests: 60
      window-seconds: 60
    public:
      max-requests: 10
      window-seconds: 60
  anti-replay:
    timestamp-tolerance-minutes: 5
    nonce-ttl-seconds: 300
  cors:
    allowed-origins: http://localhost:5173
  oauth:
    github:
      client-id: test-github-client-id
      client-secret: test-github-client-secret
      redirect-uri: http://localhost:8080/api/auth/oauth/github/callback
      frontend-callback-url: http://localhost:5173/oauth/callback
      scope: read:user user:email
