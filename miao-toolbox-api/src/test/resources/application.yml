# 测试专用 Nacos 配置
# 供 @SpringBootTest（@ActiveProfiles("test")）从 Nacos 加载配置。
# 注意：激活 test profile 时，主 application.yml 的 spring.config.import 不会被 Nacos import-check
# 识别（Spring Cloud 对主文件 config.import 在 non-default profile 下的已知隔离行为），
# 故在此显式重复完整 dataId 导入清单 + 连接信息（连接信息从环境变量读取，不写明文密钥）。
spring:
  config:
    import:
      # 测试不依赖外部 Nacos：导入标记为 optional，CI（干净环境、默认 nacos/nacos 无 SECRET_GROUP 读权限）
      # 或 Nacos 不可达时优雅跳过，使用 application-test.yml / 主 application.yml 的安全默认值启动上下文。
      # 本地若导出 NACOS_USERNAME/NACOS_PASSWORD（具备读权限），仍会加载真实配置做富化。
      - optional:nacos:application.yaml?refreshEnabled=true&group=DEFAULT_GROUP
      - optional:nacos:db-and-cache.yaml?refreshEnabled=false&group=SECRET_GROUP
      - optional:nacos:jwt.yaml?refreshEnabled=false&group=SECRET_GROUP
      - optional:nacos:oauth.yaml?refreshEnabled=false&group=SECRET_GROUP
      - optional:nacos:cos.yaml?refreshEnabled=false&group=SECRET_GROUP
      - optional:nacos:miao-ai.yaml?refreshEnabled=true&group=SECRET_GROUP
      - optional:nacos:baidu-translate.yaml?refreshEnabled=true&group=SECRET_GROUP
  cloud:
    nacos:
      config:
        serverAddr: ${NACOS_ADDR:nacos.yunmiao.site:38848}
        namespace: ${NACOS_NAMESPACE:miao-toolbox-dev}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fileExtension: yaml
