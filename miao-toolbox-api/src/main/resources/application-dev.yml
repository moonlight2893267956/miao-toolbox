spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration
  docker:
    compose:
      enabled: false
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/miao_toolbox?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${MYSQL_USER:miao}
    password: ${MYSQL_PASSWORD:miao_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:miao_redis_dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,env

miao:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-at-least-256-bits-long-do-not-use-in-production}
    refresh-secret: ${JWT_REFRESH_SECRET:dev-only-refresh-secret-key-at-least-256-bits-long-do-not-use-in-production}
  security:
    cookie-secure: false
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/oauth/github/callback}
      frontend-callback-url: ${GITHUB_FRONTEND_CALLBACK_URL:http://localhost:5173/oauth/callback}
      scope: read:user user:email
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}
      frontend-callback-url: ${GOOGLE_FRONTEND_CALLBACK_URL:http://localhost:5173/oauth/callback}
      scope: openid email profile
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:ap-guangzhou}
  ai:
    max-input-bytes: ${MIAO_AI_MAX_INPUT_BYTES:20480}
    agents:
      diff-explainer:
        enabled: ${MIAO_AI_AGENT_DIFF_ENABLED:true}
        base-url: ${MIAO_AI_AGENT_DIFF_BASE_URL:http://localhost:8000}
        agent-name: ${MIAO_AI_AGENT_DIFF_NAME:diff-explainer}
        api-key: ${MIAO_AI_AGENT_DIFF_API_KEY:}
        connect-timeout: ${MIAO_AI_AGENT_DIFF_CONNECT_TIMEOUT:5000}
        read-timeout: ${MIAO_AI_AGENT_DIFF_READ_TIMEOUT:60000}
        retry-count: ${MIAO_AI_AGENT_DIFF_RETRY_COUNT:2}
        retry-interval: ${MIAO_AI_AGENT_DIFF_RETRY_INTERVAL:1000}
      json-repairer:
        enabled: ${MIAO_AI_AGENT_JSON_REPAIR_ENABLED:true}
        base-url: ${MIAO_AI_AGENT_JSON_REPAIR_BASE_URL:http://localhost:8000}
        agent-name: ${MIAO_AI_AGENT_JSON_REPAIR_NAME:json-repairer}
        api-key: ${MIAO_AI_AGENT_JSON_REPAIR_API_KEY:}
        connect-timeout: ${MIAO_AI_AGENT_JSON_REPAIR_CONNECT_TIMEOUT:5000}
        read-timeout: ${MIAO_AI_AGENT_JSON_REPAIR_READ_TIMEOUT:300000}
        retry-count: ${MIAO_AI_AGENT_JSON_REPAIR_RETRY_COUNT:2}
        retry-interval: ${MIAO_AI_AGENT_JSON_REPAIR_RETRY_INTERVAL:1000}
  baidu:
    translate:
      enabled: ${BAIDU_TRANSLATE_ENABLED:false}
      app-id: ${BAIDU_APPID:}
      secret: ${BAIDU_SECRET:}
      translate-url: ${BAIDU_TRANSLATE_URL:https://fanyi-api.baidu.com/api/trans/vip/translate}
      detect-url: ${BAIDU_DETECT_URL:https://fanyi-api.baidu.com/api/trans/vip/language}
      image-url: ${BAIDU_IMAGE_URL:https://fanyi-api.baidu.com/api/trans/sdk/picture}
      connect-timeout: ${BAIDU_CONNECT_TIMEOUT:5000}
      read-timeout: ${BAIDU_READ_TIMEOUT:60000}
      max-concurrency: ${BAIDU_MAX_CONCURRENCY:10}
