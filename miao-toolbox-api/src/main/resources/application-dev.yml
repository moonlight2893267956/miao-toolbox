spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/miao_toolbox?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${MYSQL_USER:miao}
    password: ${MYSQL_PASSWORD:miao_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  docker:
    compose:
      file: ../docker-compose.dev.yml
      lifecycle-management: start-only

management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,env

logging:
  level:
    com.miao.toolbox: DEBUG
    org.springframework.security: DEBUG
