spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration
  docker:
    compose:
      enabled: false
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/miao_toolbox?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${MYSQL_USER:miao}
    password: ${MYSQL_PASSWORD:miao_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:miao_redis_dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,env

miao:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-at-least-256-bits-long-do-not-use-in-production}
    refresh-secret: ${JWT_REFRESH_SECRET:dev-only-refresh-secret-key-at-least-256-bits-long-do-not-use-in-production}
  security:
    cookie-secure: false
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/oauth/github/callback}
      frontend-callback-url: ${GITHUB_FRONTEND_CALLBACK_URL:http://localhost:5173/oauth/callback}
      scope: read:user user:email
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth/google/callback}
      frontend-callback-url: ${GOOGLE_FRONTEND_CALLBACK_URL:http://localhost:5173/oauth/callback}
      scope: openid email profile
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:ap-guangzhou}
