spring:
  application:
    name: miao-toolbox-api
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

miao:
  jwt:
    secret: change-me-in-production-to-a-long-random-string-at-least-256-bits
    refresh-secret: change-me-in-production-to-a-different-long-random-string
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  security:
    cookie-secure: ${COOKIE_SECURE:false}
  rate-limit:
    authenticated:
      max-requests: 60
      window-seconds: 60
    public:
      max-requests: 10
      window-seconds: 60
  anti-replay:
    timestamp-tolerance-minutes: 5
    nonce-ttl-seconds: 300
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}
      redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/oauth/github/callback}
      frontend-callback-url: ${GITHUB_FRONTEND_CALLBACK_URL:http://localhost:5173/oauth/callback}
      scope: read:user user:email
