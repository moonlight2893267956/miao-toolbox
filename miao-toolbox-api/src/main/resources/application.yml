spring:
  application:
    name: miao-toolbox-api
  config:
    import:
      # 公共配置（非敏感，支持运行时刷新）
      - nacos:application.yaml?refreshEnabled=true&group=DEFAULT_GROUP
      # 敏感配置（密钥类，刷新需重启）
      - nacos:db-and-cache.yaml?refreshEnabled=false&group=SECRET_GROUP
      - nacos:jwt.yaml?refreshEnabled=false&group=SECRET_GROUP
      - nacos:oauth.yaml?refreshEnabled=false&group=SECRET_GROUP
      - nacos:cos.yaml?refreshEnabled=false&group=SECRET_GROUP
      - nacos:miao-ai.yaml?refreshEnabled=true&group=SECRET_GROUP
      - nacos:baidu-translate.yaml?refreshEnabled=true&group=SECRET_GROUP
  cloud:
    nacos:
      config:
        serverAddr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:miao-toolbox-dev}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        fileExtension: yaml
