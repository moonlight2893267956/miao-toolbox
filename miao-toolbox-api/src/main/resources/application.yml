spring:
  application:
    name: miao-toolbox-api
  profiles:
    active: dev,local
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080
  # 反代部署时,让 Spring 解析 X-Forwarded-Proto / X-Forwarded-For
  # 否则 cookie-secure: true 在反代后面会失效(请求看起来是 HTTP)
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info

miao:
  jwt:
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  rate-limit:
    authenticated:
      max-requests: 60
      window-seconds: 60
    public:
      max-requests: 10
      window-seconds: 60
  anti-replay:
    timestamp-tolerance-minutes: 5
    nonce-ttl-seconds: 300
  cos:
    base-path: text-compare
    max-file-size: 104857600
  ai:
    enabled: ${MIAO_AI_ENABLED:false}
    base-url: ${MIAO_AI_BASE_URL:}
    api-key: ${MIAO_AI_API_KEY:}
    agent-name: ${MIAO_AI_AGENT_NAME:diff-explainer}
    connect-timeout: ${MIAO_AI_CONNECT_TIMEOUT:5000}
    read-timeout: ${MIAO_AI_READ_TIMEOUT:60000}
ai:
  invocation:
    retention-days: ${AI_INVOCATION_RETENTION_DAYS:90}
    retention-cron: ${AI_INVOCATION_RETENTION_CRON:0 0 3 * * *}
    async:
      core-pool-size: ${AI_INVOCATION_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${AI_INVOCATION_ASYNC_MAX_POOL_SIZE:8}
      queue-capacity: ${AI_INVOCATION_ASYNC_QUEUE_CAPACITY:100}
