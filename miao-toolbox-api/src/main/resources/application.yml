spring:
  application:
    name: miao-toolbox-api
  profiles:
    active: dev,local
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC
    default-property-inclusion: non_null

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

miao:
  jwt:
    access-token-expiry-minutes: ${JWT_ACCESS_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}
  rate-limit:
    authenticated:
      max-requests: 60
      window-seconds: 60
    public:
      max-requests: 10
      window-seconds: 60
  anti-replay:
    timestamp-tolerance-minutes: 5
    nonce-ttl-seconds: 300
  cos:
    base-path: text-compare
    max-file-size: 104857600
