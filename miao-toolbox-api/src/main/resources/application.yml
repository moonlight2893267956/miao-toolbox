spring:
  profiles:
    default: local
  application:
    name: miao-toolbox-api
  # 关闭 Spring Boot 4.0 的 Docker Compose 自动探测/启动：
  # 本项目的 MySQL/Redis 由外部 miao-infra 提供，模块内无 compose 文件。
  docker:
    compose:
      enabled: false
  cloud:
    nacos:
      config:
        # 本地默认通过 Nacos 读取配置（见 application-local.yml 的 spring.config.import）。
        # 启用 import-check：当 Nacos 不可达或缺少 import 条目时，启动快速失败并给出明确报错，
        # 而不是静默返回空配置导致后续 bean 初始化失败。
        import-check:
          enabled: true
