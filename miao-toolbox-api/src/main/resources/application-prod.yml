# ============================================================
# 生产环境配置 — 所有敏感值必须通过环境变量提供，无默认值
# ============================================================

spring:
  datasource:
    url: ${MYSQL_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health,info

miao:
  jwt:
    secret: ${JWT_SECRET}
    refresh-secret: ${JWT_REFRESH_SECRET}
  security:
    cookie-secure: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  oauth:
    github:
      client-id: ${GITHUB_CLIENT_ID}
      client-secret: ${GITHUB_CLIENT_SECRET}
      redirect-uri: ${GITHUB_REDIRECT_URI}
      frontend-callback-url: ${GITHUB_FRONTEND_CALLBACK_URL}
      scope: read:user user:email
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: ${GOOGLE_REDIRECT_URI}
      frontend-callback-url: ${GOOGLE_FRONTEND_CALLBACK_URL}
      scope: openid email profile
  cos:
    secret-id: ${COS_SECRET_ID}
    secret-key: ${COS_SECRET_KEY}
    bucket: ${COS_BUCKET}
    region: ${COS_REGION:ap-guangzhou}
  ai:
    max-input-bytes: ${MIAO_AI_MAX_INPUT_BYTES:20480}
    agents:
      diff-explainer:
        enabled: ${MIAO_AI_AGENT_DIFF_ENABLED:true}
        base-url: ${MIAO_AI_AGENT_DIFF_BASE_URL}
        agent-name: ${MIAO_AI_AGENT_DIFF_NAME:diff-explainer}
        api-key: ${MIAO_AI_AGENT_DIFF_API_KEY}
        connect-timeout: ${MIAO_AI_AGENT_DIFF_CONNECT_TIMEOUT:5000}
        read-timeout: ${MIAO_AI_AGENT_DIFF_READ_TIMEOUT:60000}
        retry-count: ${MIAO_AI_AGENT_DIFF_RETRY_COUNT:2}
        retry-interval: ${MIAO_AI_AGENT_DIFF_RETRY_INTERVAL:1000}
      json-repairer:
        enabled: ${MIAO_AI_AGENT_JSON_REPAIR_ENABLED:true}
        base-url: ${MIAO_AI_AGENT_JSON_REPAIR_BASE_URL}
        agent-name: ${MIAO_AI_AGENT_JSON_REPAIR_NAME:json-repairer}
        api-key: ${MIAO_AI_AGENT_JSON_REPAIR_API_KEY}
        connect-timeout: ${MIAO_AI_AGENT_JSON_REPAIR_CONNECT_TIMEOUT:5000}
        read-timeout: ${MIAO_AI_AGENT_JSON_REPAIR_READ_TIMEOUT:60000}
        retry-count: ${MIAO_AI_AGENT_JSON_REPAIR_RETRY_COUNT:0}
        retry-interval: ${MIAO_AI_AGENT_JSON_REPAIR_RETRY_INTERVAL:1000}
  baidu:
    translate:
      enabled: ${BAIDU_TRANSLATE_ENABLED:false}
      app-id: ${BAIDU_APPID}
      secret: ${BAIDU_SECRET}
      translate-url: ${BAIDU_TRANSLATE_URL:https://fanyi-api.baidu.com/api/trans/vip/translate}
      detect-url: ${BAIDU_DETECT_URL:https://fanyi-api.baidu.com/api/trans/vip/language}
      connect-timeout: ${BAIDU_CONNECT_TIMEOUT:5000}
      read-timeout: ${BAIDU_READ_TIMEOUT:60000}
      max-concurrency: ${BAIDU_MAX_CONCURRENCY:10}
