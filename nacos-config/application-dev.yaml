# DEFAULT_GROUP / application-dev.yaml — 开发环境差异覆盖（非敏感）
management:
  endpoints:
    web:
      exposure:
        include: health,info,beans,env

miao:
  ai:
    max-input-bytes: 20480
    agents:
      json-repairer:
        enabled: true
        read-timeout: 300000
  security:
    cookie-secure: false
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  baidu:
    translate:
      enabled: true
