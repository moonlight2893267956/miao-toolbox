# SECRET_GROUP / db-and-cache.yaml — 数据库与 Redis（密钥类，引用环境变量，不写明文）
spring:
  datasource:
    url: "${MYSQL_URL}"
    username: "${MYSQL_USER}"
    password: "${MYSQL_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: "${REDIS_HOST}"
      port: "${REDIS_PORT}"
      username: "${REDIS_USERNAME:}"
      password: "${REDIS_PASSWORD:}"
