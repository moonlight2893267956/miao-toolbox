# SECRET_GROUP / miao-ai.yaml — prod 引用环境变量
miao:
  ai:
    agents:
      diff-explainer:
        base-url: "${MIAO_AI_AGENT_DIFF_BASE_URL}"
        agent-name: "${MIAO_AI_AGENT_DIFF_NAME:diff-explainer}"
        api-key: "${MIAO_AI_AGENT_DIFF_API_KEY}"
      json-repairer:
        base-url: "${MIAO_AI_AGENT_JSON_REPAIR_BASE_URL}"
        agent-name: "${MIAO_AI_AGENT_JSON_REPAIR_NAME:json-repairer}"
        api-key: "${MIAO_AI_AGENT_JSON_REPAIR_API_KEY}"
      translate-agent:
        base-url: "${MIAO_AI_AGENT_TRANSLATE_BASE_URL}"
        agent-name: "${MIAO_AI_AGENT_TRANSLATE_NAME:translate-agent}"
        api-key: "${MIAO_AI_AGENT_TRANSLATE_API_KEY}"
      regex-assistant:
        base-url: "${MIAO_AI_AGENT_REGEX_BASE_URL}"
        agent-name: "${MIAO_AI_AGENT_REGEX_NAME:regex-assistant}"
        api-key: "${MIAO_AI_AGENT_REGEX_API_KEY}"
      cron-assistant:
        base-url: "${MIAO_AI_AGENT_CRON_BASE_URL}"
        agent-name: "${MIAO_AI_AGENT_CRON_NAME:cron-assistant}"
        api-key: "${MIAO_AI_AGENT_CRON_API_KEY}"
        read-timeout: 120000
        retry-count: 2
        retry-interval: 1000
