# SECRET_GROUP / db-and-cache.yaml — prod 通过 ${ENV_VAR} 引用环境变量，Nacos 不存明文密钥
spring:
  datasource:
    url: "${MYSQL_URL}"
    username: "${MYSQL_USER}"
    password: "${MYSQL_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: "${REDIS_HOST}"
      port: "${REDIS_PORT}"
      username: "${REDIS_USERNAME:}"
      password: "${REDIS_PASSWORD:}"
