# SECRET_GROUP / cos.yaml — dev 真实 COS 密钥占位符，由 application-local.yml 渲染
miao:
  cos:
    secret-id: "${MIAO_COS_SECRET_ID}"
    secret-key: "${MIAO_COS_SECRET_KEY}"
    bucket: "${MIAO_COS_BUCKET}"
    region: "${MIAO_COS_REGION}"
    base-path: "text-compare"
    max-file-size: 104857600
    max-download-size: 104857600
