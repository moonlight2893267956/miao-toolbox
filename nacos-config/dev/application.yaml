# DEFAULT_GROUP / application.yaml — miao-toolbox-dev 完整公共配置（非敏感，dev 直写值）
# 键名以真实 @ConfigurationProperties / @Value 为准，不照搬架构 §4 的错误键名
server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: miao-toolbox-api
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    time-zone: UTC
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

miao:
  rate-limit:
    authenticated:
      max-requests: 60
      window-seconds: 60
    public:
      max-requests: 10
      window-seconds: 60
  anti-replay:
    timestamp-tolerance-minutes: 5
    nonce-ttl-seconds: 300
  cos:
    base-path: text-compare
    max-file-size: 104857600
  ai:
    invocation:
      retention-days: 90
      retention-cron: 0 0 3 * * *
      async:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 100
    agents:
      diff-explainer:
        enabled: true
        connect-timeout: 5000
        read-timeout: 60000
        retry-count: 2
        retry-interval: 1000
      json-repairer:
        enabled: true
        connect-timeout: 5000
        read-timeout: 60000
        retry-count: 0
        retry-interval: 1000
      translate-agent:
        enabled: true
        connect-timeout: 5000
        read-timeout: 120000
        retry-count: 2
        retry-interval: 1000
  baidu:
    translate:
      enabled: true
      translate-url: https://fanyi-api.baidu.com/api/trans/vip/translate
      detect-url: https://fanyi-api.baidu.com/api/trans/vip/language
      image-url: https://fanyi-api.baidu.com/api/trans/sdk/picture
      voice-url: https://fanyi-api.baidu.com/api/trans/v2/voicetrans
      connect-timeout: 5000
      read-timeout: 60000
      max-concurrency: 10
  security:
    cookie-secure: false
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS}"
