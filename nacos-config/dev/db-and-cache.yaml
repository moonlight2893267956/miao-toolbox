# SECRET_GROUP / db-and-cache.yaml — dev 真实值由占位符从本地 .env 渲染（不写明文，符合红线）
spring:
  datasource:
    url: "${MYSQL_URL}"
    username: "${MYSQL_USER}"
    password: "${MYSQL_PASSWORD}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: "${REDIS_HOST}"
      port: ${REDIS_PORT}
      username: ""
      password: "${REDIS_PASSWORD}"
