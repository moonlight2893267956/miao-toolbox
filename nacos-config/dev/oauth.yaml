# SECRET_GROUP / oauth.yaml — dev 真实 OAuth 密钥占位符，由 application-local.yml 渲染
miao:
  oauth:
    github:
      client-id: "${MIAO_OAUTH_GITHUB_CLIENT_ID}"
      client-secret: "${MIAO_OAUTH_GITHUB_CLIENT_SECRET}"
      redirect-uri: "http://localhost:8080/api/auth/oauth/github/callback"
      frontend-callback-url: "http://localhost:5173/oauth/callback"
    google:
      client-id: "${MIAO_OAUTH_GOOGLE_CLIENT_ID}"
      client-secret: "${MIAO_OAUTH_GOOGLE_CLIENT_SECRET}"
      redirect-uri: "http://localhost:8080/api/auth/oauth/google/callback"
      frontend-callback-url: "http://localhost:5173/oauth/callback"
