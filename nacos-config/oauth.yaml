# SECRET_GROUP / oauth.yaml — OAuth 客户端密钥（引用环境变量，不写明文）
miao:
  oauth:
    github:
      client-id: "${GITHUB_CLIENT_ID}"
      client-secret: "${GITHUB_CLIENT_SECRET}"
      redirect-uri: "${GITHUB_REDIRECT_URI}"
      frontend-callback-url: "${GITHUB_FRONTEND_CALLBACK_URL}"
      scope: "${GITHUB_SCOPE:read:user user:email}"
    google:
      client-id: "${GOOGLE_CLIENT_ID}"
      client-secret: "${GOOGLE_CLIENT_SECRET}"
      redirect-uri: "${GOOGLE_REDIRECT_URI}"
      frontend-callback-url: "${GOOGLE_FRONTEND_CALLBACK_URL}"
      scope: "${GOOGLE_SCOPE:openid email profile}"
