name: miao-toolbox

# 生产环境编排:
#   - api: Spring Boot 后端,容器内 8080,宿主机 127.0.0.1:8088
#   - web: 前端 nginx,容器内 80,宿主机 127.0.0.1:8089
# 前端 nginx 通过 /api/ 反代到 miao-api:8080(同网络)
# 宿主机宝塔 nginx 通过 tools.yunmiao.site vhost 再反代到 8088/8089
#
# ⚠️ MySQL/Redis 不在本编排内,由外部项目 miao-infra 提供:
#   - 容器名: miao-mysql / miao-redis(固定名,miao-infra 自己声明)
#   - 网络:   miao-infra-net(external,本编排声明引用)
#   - 账号:   MYSQL_USER / MYSQL_PASSWORD 由 miao-infra 启动时生成的 .env 提供
#             本项目只关心业务库名(MYSQL_DATABASE= miao_toolbox)
#   - 跨 compose 健康检查: 部署脚本 step_wait_infra() 会先轮询 miao-mysql/miao-redis healthy,
#             再启本编排的 api/web;api 容器自带 start_period=120s 兜底

services:
  api:
    build:
      context: ./miao-toolbox-api
      dockerfile: Dockerfile
    image: ghcr.io/moonlight2893267956/miao-toolbox-api:latest
    restart: unless-stopped
    # 不再 depends_on mysql/redis(跨 compose 不支持)
    # 启动期间允许 unhealthy,等 miao-infra 就绪 + Spring Boot/HikariCP 重试兜底
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    # 让容器能解析宿主机名(走 Clash 代理用)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      # 给容器内其他工具(curl/wget)用
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      # 覆盖 Dockerfile 的 JAVA_OPTS,加代理配置
      # nonProxyHosts 排除:docker 内网服务 + 宿主机反代 + 私网,避免内网流量绕一圈
      # miao-mysql / miao-redis 在 miao-infra 提供的 miao-infra-net 网络里
      JAVA_OPTS: >-
        -Xms256m -Xmx384m -XX:+UseG1GC
        -Dhttp.proxyHost=host.docker.internal
        -Dhttp.proxyPort=7890
        -Dhttps.proxyHost=host.docker.internal
        -Dhttps.proxyPort=7890
        -Dhttp.nonProxyHosts=miao-mysql|miao-redis|miao-backend|api|web|localhost|127.*|*.yunmiao.site|10.*|172.16.*|172.17.*|172.18.*|192.168.*|172.19.*|host.docker.internal
      # 数据库(由 miao-infra 提供)
      # characterEncoding 必须是 Java 识别的 charset 名(UTF-8),不是 MySQL 服务端的 utf8mb4
      MYSQL_URL: jdbc:mysql://miao-mysql:3306/${MYSQL_DATABASE:-miao_toolbox}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: ${MYSQL_USER:?必须设置 MYSQL_USER(miao-infra 生成的 .env 中)}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD(miao-infra 生成的 .env 中)}
      # Redis(由 miao-infra 提供)
      REDIS_HOST: miao-redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD(miao-infra 生成的 .env 中)}
      # JWT(必填)
      JWT_SECRET: ${JWT_SECRET:?必须设置 JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?必须设置 JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?必须设置 CORS_ALLOWED_ORIGINS}
      # OAuth(可选)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITHUB_FRONTEND_CALLBACK_URL: ${GITHUB_FRONTEND_CALLBACK_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_FRONTEND_CALLBACK_URL: ${GOOGLE_FRONTEND_CALLBACK_URL:-}
      # 腾讯云 COS(可选)
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      # miao-ai Agent: diff-explainer (文本对比 AI 解释)
      MIAO_AI_AGENT_DIFF_ENABLED: ${MIAO_AI_AGENT_DIFF_ENABLED:-true}
      MIAO_AI_AGENT_DIFF_BASE_URL: ${MIAO_AI_AGENT_DIFF_BASE_URL:-}
      MIAO_AI_AGENT_DIFF_NAME: ${MIAO_AI_AGENT_DIFF_NAME:-diff-explainer}
      MIAO_AI_AGENT_DIFF_API_KEY: ${MIAO_AI_AGENT_DIFF_API_KEY:-}
      MIAO_AI_AGENT_DIFF_CONNECT_TIMEOUT: ${MIAO_AI_AGENT_DIFF_CONNECT_TIMEOUT:-5000}
      MIAO_AI_AGENT_DIFF_READ_TIMEOUT: ${MIAO_AI_AGENT_DIFF_READ_TIMEOUT:-60000}
      MIAO_AI_AGENT_DIFF_RETRY_COUNT: ${MIAO_AI_AGENT_DIFF_RETRY_COUNT:-2}
      MIAO_AI_AGENT_DIFF_RETRY_INTERVAL: ${MIAO_AI_AGENT_DIFF_RETRY_INTERVAL:-1000}
      # miao-ai Agent: json-repairer (JSON 格式修复)
      MIAO_AI_AGENT_JSON_REPAIR_ENABLED: ${MIAO_AI_AGENT_JSON_REPAIR_ENABLED:-true}
      MIAO_AI_AGENT_JSON_REPAIR_BASE_URL: ${MIAO_AI_AGENT_JSON_REPAIR_BASE_URL:-}
      MIAO_AI_AGENT_JSON_REPAIR_NAME: ${MIAO_AI_AGENT_JSON_REPAIR_NAME:-json-repairer}
      MIAO_AI_AGENT_JSON_REPAIR_API_KEY: ${MIAO_AI_AGENT_JSON_REPAIR_API_KEY:-}
      MIAO_AI_AGENT_JSON_REPAIR_CONNECT_TIMEOUT: ${MIAO_AI_AGENT_JSON_REPAIR_CONNECT_TIMEOUT:-5000}
      MIAO_AI_AGENT_JSON_REPAIR_READ_TIMEOUT: ${MIAO_AI_AGENT_JSON_REPAIR_READ_TIMEOUT:-60000}
      MIAO_AI_AGENT_JSON_REPAIR_RETRY_COUNT: ${MIAO_AI_AGENT_JSON_REPAIR_RETRY_COUNT:-2}
      MIAO_AI_AGENT_JSON_REPAIR_RETRY_INTERVAL: ${MIAO_AI_AGENT_JSON_REPAIR_RETRY_INTERVAL:-1000}
      # AI 输入限制
      MIAO_AI_MAX_INPUT_BYTES: ${MIAO_AI_MAX_INPUT_BYTES:-20480}
    ports:
      - "127.0.0.1:8088:8080"
    networks:
      - miao-net
      - miao-infra-net
    # 资源限制(防 OOM)
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ./miao-toolbox-web
      dockerfile: Dockerfile
    image: ghcr.io/moonlight2893267956/miao-toolbox-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8089:80"
    networks:
      - miao-net
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  miao-net:
    driver: bridge
  miao-infra-net:
    # miao-infra 提供的外部网络,要求 miao-infra 已 up
    external: true
    name: miao-infra-net
