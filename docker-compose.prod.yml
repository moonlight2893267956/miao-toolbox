name: miao-toolbox

# 生产环境编排:
#   - api: Spring Boot 后端,容器内 8080,宿主机 127.0.0.1:8088
#   - web: 前端 nginx,容器内 80,宿主机 127.0.0.1:8089
#   - mysql: MySQL 8.4,持久化数据卷
#   - redis: Redis 7-alpine,持久化数据卷
# 前端 nginx 通过 /api/ 反代到 miao-api:8080(同网络)
# 宿主机宝塔 nginx 通过 tools.yunmiao.site vhost 再反代到 8088/8089

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?必须设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-miao_toolbox}
      MYSQL_USER: ${MYSQL_USER:?必须设置 MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?必须设置 MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [miao-net]
    # 不向宿主机暴露端口,只在 docker 网络内通信
    expose: ["3306"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [miao-net]
    expose: ["6379"]

  api:
    build:
      context: ./miao-toolbox-api
      dockerfile: Dockerfile
    image: miao-toolbox/api:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 让容器能解析宿主机名(走 Clash 代理用)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Shanghai
      # 给容器内其他工具(curl/wget)用
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      # 覆盖 Dockerfile 的 JAVA_OPTS,加代理配置
      # nonProxyHosts 排除:docker 内网服务 + 宿主机反代 + 私网,避免内网流量绕一圈
      JAVA_OPTS: >-
        -Xms256m -Xmx384m -XX:+UseG1GC
        -Dhttp.proxyHost=host.docker.internal
        -Dhttp.proxyPort=7890
        -Dhttps.proxyHost=host.docker.internal
        -Dhttps.proxyPort=7890
        -Dhttp.nonProxyHosts=mysql|redis|api|web|localhost|127.*|*.yunmiao.site|10.*|172.16.*|172.17.*|172.18.*|192.168.*
      # 数据库
      # characterEncoding 必须是 Java 识别的 charset 名(UTF-8),不是 MySQL 服务端的 utf8mb4
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-miao_toolbox}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT(必填)
      JWT_SECRET: ${JWT_SECRET:?必须设置 JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?必须设置 JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY_MINUTES: ${JWT_ACCESS_EXPIRY_MINUTES:-15}
      JWT_REFRESH_EXPIRY_DAYS: ${JWT_REFRESH_EXPIRY_DAYS:-7}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?必须设置 CORS_ALLOWED_ORIGINS}
      # OAuth(可选)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITHUB_FRONTEND_CALLBACK_URL: ${GITHUB_FRONTEND_CALLBACK_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_FRONTEND_CALLBACK_URL: ${GOOGLE_FRONTEND_CALLBACK_URL:-}
      # 腾讯云 COS(可选)
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
    ports:
      - "127.0.0.1:8088:8080"
    networks: [miao-net]
    # 资源限制(防 OOM)
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ./miao-toolbox-web
      dockerfile: Dockerfile
    image: miao-toolbox/web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:8089:80"
    networks: [miao-net]
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql-data:
  redis-data:

networks:
  miao-net:
    driver: bridge
